name: release

# Publishes the libraries. SAFE BY DEFAULT:
#  - never runs on normal push/PR (only on a vX.Y.Z tag, or a manual dispatch);
#  - the manual dispatch defaults to `dry-run` (build + validate, NO upload);
#  - real PyPI publish uses Trusted Publishing (must be configured on PyPI first)
#    and npm publish needs the NPM_TOKEN secret — until then, a publish step
#    simply fails without shipping anything.
# See docs/releasing.md for the one-time setup + how to cut a release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "dry-run = build + twine check only; testpypi; pypi"
        type: choice
        options: [dry-run, testpypi, pypi]
        default: dry-run

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) — no token in repo
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build all Python packages (sdist + wheel)
        run: uv build --all-packages --out-dir dist
      - name: Validate distribution metadata
        run: uvx twine check dist/*
      - name: Resolve target
        id: t
        run: echo "target=${{ github.event_name == 'push' && 'pypi' || github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
      - name: Publish to TestPyPI
        if: steps.t.outputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: steps.t.outputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agent-capture/sdk build
      - name: Resolve target
        id: t
        run: echo "target=${{ github.event_name == 'push' && 'pypi' || github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        if: steps.t.outputs.target == 'pypi'
        run: pnpm --filter @agent-capture/sdk publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Service container images → GHCR. Builds on any dispatch (verification),
  # but only PUSHES on a real vX.Y.Z tag. GHCR auth uses the built-in
  # GITHUB_TOKEN — no extra secret. (First push of each image may need the
  # package visibility set to public in the repo's Packages settings.)
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ledger, enforcement]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Compute image ref
        id: img
        run: |
          ref="${{ github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on a tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/${{ matrix.service }}/docker/Dockerfile
          push: ${{ github.ref_type == 'tag' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.img.outputs.owner }}/agent-capture-${{ matrix.service }}:${{ steps.img.outputs.version }}
            ghcr.io/${{ steps.img.outputs.owner }}/agent-capture-${{ matrix.service }}:latest
