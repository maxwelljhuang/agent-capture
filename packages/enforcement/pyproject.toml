[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "agent-capture-enforcement"
version = "0.1.0"
description = "Enforcement engine for agent-capture trajectories (layer 5 of the compliance stack)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "agent-capture contributors" }]
keywords = ["ai", "agent", "compliance", "enforcement", "policy"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "agent-capture",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "pyyaml>=6.0",
    "structlog>=24.2",
    "prometheus-client>=0.20",
    "typer>=0.12",
    "httpx>=0.27",
    "uuid-utils>=0.9",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "types-pyyaml>=6.0",
]
# Heavy integration-test deps; opt in only on the enforcement CI job.
enforcement-dev = [
    "aiosqlite>=0.20",
]

[project.scripts]
enforcement = "agent_capture_enforcement.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_capture_enforcement"]

[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "B", "UP", "RUF", "SIM", "PT", "D",
]
ignore = [
    "D100", "D101", "D102", "D103", "D104", "D105", "D107",
    "D203", "D213", "D205", "D209",
    "SIM105", "SIM117",
    "B008",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "S101", "PT012", "E501"]
"src/agent_capture_enforcement/storage/migrations/**" = ["D", "E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["alembic.*", "uuid_utils.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "integration: requires Postgres",
    "e2e: requires Postgres + recorder + ledger",
]

[tool.coverage.run]
source = ["src/agent_capture_enforcement"]
branch = true
