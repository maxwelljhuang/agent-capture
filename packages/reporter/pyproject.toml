[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "agent-capture-reporter"
version = "0.1.0"
description = "Compliance notice renderer for agent-capture trajectories (layer 3 of the compliance stack)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "agent-capture contributors" }]
keywords = ["ai", "agent", "compliance", "reporting", "ecoa", "adverse-action"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "agent-capture",
    "pydantic>=2.7",
    "jinja2>=3.1",
    "typer>=0.12",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
# PDF rendering pulls native libs (cairo/pango/gdk-pixbuf). Keep it optional so
# the HTML + manifest path installs cleanly without system deps; CI's pdf job
# installs the native libs and this extra.
pdf = ["weasyprint>=62"]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "types-pyyaml>=6.0",
]

[project.scripts]
agent-capture-report = "agent_capture_reporter.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_capture_reporter"]

[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "RUF", "SIM", "PT", "D"]
ignore = [
    "D100", "D101", "D102", "D103", "D104", "D105", "D107",
    "D203", "D213", "D205", "D209",
    "SIM105", "SIM117",
    "B008",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "S101", "PT012", "E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# WeasyPrint ships no type stubs and is an optional dependency.
[[tool.mypy.overrides]]
module = ["weasyprint.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "pdf: requires WeasyPrint + native libs (cairo/pango)",
]

[tool.coverage.run]
source = ["src/agent_capture_reporter"]
branch = true
