[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "agent-capture"
version = "0.1.0"
description = "Trajectory capture engine for AI agent compliance"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "agent-capture contributors" }]
keywords = ["ai", "agent", "tracing", "compliance", "observability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "pydantic>=2.7",
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "httpx>=0.27",
    "cryptography>=42",
    "typing-extensions>=4.10",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.50"]
langgraph = ["langgraph>=0.2", "langchain-core>=0.3"]
crewai = ["crewai>=1.14"]
# `litellm` (like `crewai`) is intentionally NOT in `all` — heavy tree, and it
# would bloat the recorder test venv against the memory-budget test.
litellm = ["litellm>=1.0"]
bedrock = ["boto3>=1.34"]
vertex = ["google-cloud-aiplatform>=1.60"]
redaction = ["presidio-analyzer>=2.2", "presidio-anonymizer>=2.2"]
otlp = ["opentelemetry-exporter-otlp-proto-http>=1.25"]
# Note: `crewai` is intentionally NOT in `all`. Its transitive tree
# (litellm, chromadb, …) is heavy and slows/destabilizes CI's --all-extras
# sync. Install it explicitly with `agent-capture[crewai]`.
all = [
    "anthropic>=0.40",
    "openai>=1.50",
    "langgraph>=0.2",
    "langchain-core>=0.3",
    "boto3>=1.34",
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
    "opentelemetry-exporter-otlp-proto-http>=1.25",
]

[project.urls]
Homepage = "https://github.com/anthropic-experimental/agent-capture"
Documentation = "https://github.com/anthropic-experimental/agent-capture/tree/main/docs"

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.112",
    "respx>=0.21",
    "types-pyyaml>=6.0",
    "psutil>=5.9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agent_capture"]

[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "RUF",  # ruff-specific
    "SIM",  # flake8-simplify
    "PT",   # flake8-pytest-style
    "D",    # pydocstyle (lightly)
]
ignore = [
    # Missing docstrings — flagged only on public API later, not blanket.
    "D100", "D101", "D102", "D103", "D104", "D105", "D107",
    # Incompatible D rules
    "D203", "D213",
    # Pedantic style we deliberately don't want:
    "D205",   # 1 blank line between summary and description — we use single-paragraph summaries
    "D209",   # multi-line docstring closing on same line as content
    "SIM105", # use contextlib.suppress — try/except: pass is fine
    "SIM117", # combine nested with statements — readability is fine as-is
    "B008",   # function call in default arg — fine for callables like `time.sleep`
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "S101", "PT012"]
# Scripts mutate sys.path before imports — E402 doesn't apply.
"scripts/**" = ["E402"]
# Examples are demo code, not library code; relaxed rules.
"packages/python/examples/**" = ["D", "E402"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# CrewAI ships no type stubs; treat its imports as untyped.
[[tool.mypy.overrides]]
module = ["crewai.*"]
ignore_missing_imports = true

# LiteLLM ships no type stubs; treat its imports as untyped.
[[tool.mypy.overrides]]
module = ["litellm.*"]
ignore_missing_imports = true

# The LiteLLM adapter subclasses CustomLogger (Any once its stubs are ignored);
# the typed, litellm-free logic lives in _litellm_core.
[[tool.mypy.overrides]]
module = ["agent_capture.instrumentation.adapters.litellm"]
disallow_subclassing_any = false

# The CrewAI adapter subclasses BaseEventListener (Any) and uses the bus's
# untyped @event_bus.on(...) decorator. Relax those two strict checks for
# this one module — the translation logic lives in the fully-typed,
# crewai-free _crewai_emitter module.
[[tool.mypy.overrides]]
module = ["agent_capture.instrumentation.adapters.crewai"]
disallow_subclassing_any = false
disallow_untyped_decorators = false

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "integration: requires optional extras / network",
    "perf: performance budget tests (slow)",
]

[tool.coverage.run]
source = ["src/agent_capture"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
