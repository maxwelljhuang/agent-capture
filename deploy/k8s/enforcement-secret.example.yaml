# Example Kubernetes Secret for the ENFORCEMENT service.
# Replace every CHANGEME, then `kubectl apply -f`. Do NOT commit a filled-in copy.
# See docs/key-management.md.
apiVersion: v1
kind: Secret
metadata:
  name: enforcement-secrets
type: Opaque
stringData:
  ENFORCEMENT_DATABASE_URL: postgresql+asyncpg://enforcement:CHANGEME@db:5432/enforcement
  ENFORCEMENT_SERVICE_TOKEN: CHANGEME       # recorder client + resolution polling
  ENFORCEMENT_REVIEWER_TOKEN: CHANGEME      # /holds review API
  ENFORCEMENT_RULES_PATH: /app/rules.yaml   # mount the bank-authored rule file here
---
# Pod spec sketch:
# containers:
#   - name: enforcement
#     envFrom: [{ secretRef: { name: enforcement-secrets } }]
#     # mount the rules file (e.g. from a ConfigMap) at ENFORCEMENT_RULES_PATH
