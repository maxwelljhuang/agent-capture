# Example Kubernetes Secret for the LEDGER service.
# Replace every CHANGEME and the signing key, then `kubectl apply -f`.
# Do NOT commit a filled-in copy. See docs/key-management.md.
apiVersion: v1
kind: Secret
metadata:
  name: ledger-secrets
type: Opaque
stringData:
  LEDGER_DATABASE_URL: postgresql+asyncpg://ledger_app:CHANGEME@db:5432/ledger
  LEDGER_DATABASE_URL_RETENTION: postgresql+asyncpg://ledger_retention:CHANGEME@db:5432/ledger
  LEDGER_DATABASE_URL_MIGRATE: postgresql+asyncpg://postgres:CHANGEME@db:5432/ledger
  LEDGER_SIGNING_KEY_ID: primary
  LEDGER_SIGNING_KEY_PATH: /secrets/primary.priv.pem
  # Mount this key as a file at LEDGER_SIGNING_KEY_PATH (e.g. a volume from this
  # Secret, or a dedicated CSI/KMS mount). Unencrypted Ed25519 PKCS8 PEM:
  primary.priv.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE-WITH-YOUR-ED25519-PKCS8-PEM
    -----END PRIVATE KEY-----
---
